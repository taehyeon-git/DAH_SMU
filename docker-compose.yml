services:

  # ── 송골매 UAV 시뮬레이터
  dah-uav:
    build:
      context: .
      dockerfile: uav/Dockerfile
    container_name: dah-uav
    depends_on:
      - dah-companion
    environment:
      CC_HOST: 172.31.50.30        # companion computer IP
      CC_PORT: "14550"
      CMD_PORT: "14551"
      SITL_SPEEDUP: "5"
    networks:
      dah-net:
        ipv4_address: 172.31.50.10         # UAV 고정 IP

  # ── Companion Computer (UAV 탑재 컴퓨터)
  # MAVLink 수신(dah-net) → JSON 변환 → GCS UDP(ops_net)
  dah-companion:
    build:
      context: .
      dockerfile: companion_computer/Dockerfile
    container_name: dah-companion
    environment:
      MAVLINK_PORT: 14550
      GCS_HOST: dah-gcs
      GCS_PORT: 14555                     # CC → GCS 텔레메트리
      CMD_PORT: 14552                     # GCS → CC 직접 명령
      UAV_HOST: 172.31.50.10
      UAV_CMD_PORT: 14551
      RECON_MIRROR_ENABLED: "true"
      RECON_MIRROR_HOST: 172.31.50.40
      RECON_MIRROR_PORT: "14550"
    depends_on:
      - dah-gcs
    networks:
      dah-net:
        ipv4_address: 172.31.50.30         # dah-net: UAV MAVLink 수신
      ops_net:                             # ops_net: GCS로 텔레메트리 전달

  # ── UGV 시뮬레이터
  dah-ugv:
    build:
      context: .
      dockerfile: ugv/Dockerfile
    container_name: dah-ugv
    environment:
      ROUTER_HOST: tactical-router
      ROUTER_PORT: 14660
      CMD_PORT: 14661
    depends_on:
      - tactical-router
    networks:
      uav_net:
      dah-net:
        ipv4_address: 172.31.50.20

  # ── GCS / Ground Gateway / Mission Control Server  ← 중앙 허브
  # CC(UAV) 텔레메트리 직수신 → Dashboard / Collector / Router fan-out
  # Upper C2 명령(Router 경유) → CC 하달
  # 운용자 직접 Command → CC
  dah-gcs:
    build:
      context: .
      dockerfile: gcs/Dockerfile
    container_name: dah-gcs
    environment:
      CC_LISTEN_PORT: 14555               # CC → GCS 텔레메트리
      C2_CMD_LISTEN_PORT: 14562           # Router → GCS Upper C2 명령
      DASHBOARD_HOST: dah-dashboard
      DASHBOARD_PORT: 14571               # GCS → Dashboard fan-out
      COLLECTOR_HOST: telemetry-collector
      COLLECTOR_PORT: 14541               # GCS → Collector fan-out
      ROUTER_HOST: tactical-router
      ROUTER_PORT: 14560                  # GCS → Router 전술 릴레이
      CC_HOST: dah-companion
      CC_CMD_PORT: 14552                  # GCS → CC 직접 명령
    depends_on:
      - tactical-router
      - telemetry-collector
    networks:
      - ops_net

  # ── Virtual Tactical Router / TIPS
  # GCS 전술망 데이터 수신 → TMMR/TICN 시뮬레이션 → Upper C2/BMS 전달
  # Upper C2 명령 수신 → GCS 하달
  tactical-router:
    build:
      context: .
      dockerfile: tactical_router/Dockerfile
    container_name: dah-tactical-router
    ports:
      - "8084:8080"
      - "14590:14590/udp"
    environment:
      GCS_LISTEN_PORT: 14560              # GCS → Router 전술 릴레이 (UAV)
      UGV_LISTEN_PORT: 14660              # UGV → Router 직접
      C2_CMD_IN_PORT: 14546              # Upper C2 → Router 명령
      JAM_LISTEN_PORT: 14590
      STATUS_PORT: 8080
      ROUTER_LAT: "37.85"
      ROUTER_LON: "126.85"
      UPPER_C2_HOST: mission-control
      UPPER_C2_PORT: 14545               # Router → Upper C2
      GCS_HOST: dah-gcs
      GCS_CMD_PORT: 14562                # Router → GCS 명령 하달
      DASHBOARD_HOST: dah-dashboard
      DASHBOARD_PORT: 14571              # Router → Dashboard UGV fan-out
    networks:
      - uav_net
      - ops_net

  # ── Upper C2 / BMS
  # Router 경유 전술 상황 데이터 수신 → 작전 명령 하달 → Router → GCS → CC → UAV
  mission-control:
    build:
      context: .
      dockerfile: c2/mission_control/Dockerfile
    container_name: dah-mission-control
    networks:
      - ops_net

  # ── 텔레메트리 수집기
  telemetry-collector:
    build:
      context: .
      dockerfile: telemetry_collector/Dockerfile
    container_name: dah-telemetry-collector
    environment:
      LISTEN_PORT: 14541
    networks:
      - ops_net

  # ── 대시보드
  dah-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dah-dashboard
    depends_on:
      - dah-gcs
      - mission-control
      - telemetry-collector
    environment:
      MISSION_CONTROL_URL: http://mission-control:8080
      GCS_URL: http://dah-gcs:8080
      ROUTER_TELEMETRY_PORT: 14571        # GCS → Dashboard UDP fan-out 수신 포트
      UAV_HOST: 172.31.50.10
      UAV_CMD_PORT: 14551
      UGV_HOST: 172.31.50.20
      UGV_CMD_PORT: 14661
    networks:
      ops_net:
      dah-net:
        ipv4_address: 172.31.50.70

  # ── 정찰 에이전트 (Passive MAVLink Recon — Low-Privilege Sentinel)
  dah-recon:
    profiles: ["recon-lab"]
    restart: "no"
    build:
      context: .
      dockerfile: attack_agent/Dockerfile
    container_name: dah-recon
    depends_on:
      - dah-dashboard
      - dah-uav
      - dah-companion
    command:
      - python
      - recon.py
      - --listen-host
      - "0.0.0.0"
      - --listen-port
      - "14550"
      - --duration-s
      - "${RECON_DURATION_S:-30}"
      - --revalidate-s
      - "${RECON_REVALIDATE_S:-20}"
      - --prediction-horizon-s
      - "${RECON_PREDICTION_HORIZON_S:-60}"
      - --chain-handoff
      - /app/output/intel_handoff.json
      - --output
      - /app/output/passive_mavlink_intel.json
    environment:
      DASHBOARD_HOST: dah-dashboard
      DASHBOARD_PORT: "14571"
      UAV_HOST: 172.31.50.10
      UAV_CMD_PORT: "14551"
      AGENT_EXECUTOR_HOST: 172.31.50.50
    volumes:
      - ./output:/app/output
    networks:
      dah-net:
        ipv4_address: 172.31.50.40
      ops_net:

  # ── 방어 에이전트 (탐지 + 차단)
  dah-defense:
    profiles: ["defense-lab"]
    restart: "no"
    build:
      context: .
      dockerfile: defense_agent/Dockerfile
    container_name: dah-defense
    command: ["python", "-m", "defense_agents.orchestrator"]
    environment:
      DASHBOARD_HOST: dah-dashboard
      DASHBOARD_PORT: "14571"
      ROUTER_HOST: dah-tactical-router
      ROUTER_PORT: "8080"
      UAV_HOST: 172.31.50.10
      UAV_PORT: "14551"
      DEFENSE_POLICY_PATH: /app/defense_agents/policies/default_policy.json
      DEFENSE_OUTPUT_DIR: /app/output
    volumes:
      - ./output:/app/output
    networks:
      dah-net:
        ipv4_address: 172.31.50.60
      ops_net:

  # ── API Gateway (nginx) — localhost:8080 단일 진입점
  dah-gateway:
    image: nginx:alpine
    container_name: dah-gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9000:8080"
    depends_on:
      - dah-dashboard
      - dah-gcs
      - mission-control
      - tactical-router
    networks:
      - ops_net

# ── 가상 네트워크
networks:
  uav_net:
    driver: bridge
  ops_net:
    driver: bridge
  dah-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.50.0/24
