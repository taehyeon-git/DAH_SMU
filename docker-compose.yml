services:

  # ── 송골매 UAV 시뮬레이터
  dah-uav:
    build:
      context: .
      dockerfile: uav/Dockerfile
    container_name: dah-uav
    depends_on:
      - dah-companion
    networks:
      dah-net:
        ipv4_address: 172.20.0.10         # UAV 고정 IP

  # ── Companion Computer (UAV 탑재 컴퓨터)
  # MAVLink 수신(dah-net) → JSON 변환 → Tactical Router UDP(ops_net)
  dah-companion:
    build:
      context: .
      dockerfile: companion_computer/Dockerfile
    container_name: dah-companion
    environment:
      MAVLINK_PORT: 14550
      ROUTER_HOST: tactical-router
      ROUTER_PORT: 14555
      CMD_PORT: 14552
      UAV_HOST: 172.20.0.10
      UAV_CMD_PORT: 14551
    depends_on:
      - tactical-router
    networks:
      dah-net:
        ipv4_address: 172.20.0.30         # dah-net: UAV MAVLink 수신
      ops_net:                             # ops_net: Router로 텔레메트리 전달

  # ── UGV 시뮬레이터
  dah-ugv:
    build:
      context: .
      dockerfile: ugv/Dockerfile
    container_name: dah-ugv
    environment:
      ROUTER_HOST: tactical-router
      ROUTER_PORT: 14660
      CMD_PORT: 14661
    depends_on:
      - tactical-router
    networks:
      uav_net:
      dah-net:
        ipv4_address: 172.20.0.20

  # ── TICN 전술 라우터
  # CC(UAV) + UGV 텔레메트리 수신 → GCS / Mission Control / Dashboard / Collector fan-out
  # GCS/MC Command 수신 → CC 전달
  tactical-router:
    build:
      context: .
      dockerfile: tactical_router/Dockerfile
    container_name: dah-tactical-router
    environment:
      CC_LISTEN_PORT: 14555
      UGV_LISTEN_PORT: 14660
      CMD_LISTEN_PORT: 14580
      MISSION_HOST: mission-control
      MISSION_PORT: 14540
      COLLECTOR_HOST: telemetry-collector
      COLLECTOR_PORT: 14541
      GCS_HOST: dah-gcs
      GCS_PORT: 14570
      DASHBOARD_HOST: dah-dashboard
      DASHBOARD_PORT: 14571
      CC_CMD_HOST: dah-companion
      CC_CMD_PORT: 14552
    networks:
      - uav_net
      - ops_net

  # ── C2 / Mission Control 서버
  mission-control:
    build:
      context: .
      dockerfile: c2/mission_control/Dockerfile
    container_name: dah-mission-control
    ports:
      - "8082:8080"
    networks:
      - ops_net

  # ── 텔레메트리 수집기
  telemetry-collector:
    build:
      context: .
      dockerfile: telemetry_collector/Dockerfile
    container_name: dah-telemetry-collector
    environment:
      LISTEN_PORT: 14541
    networks:
      - ops_net

  # ── GCS (Ground Control Station) — 신규
  # Router로부터 텔레메트리 직수신 / Command → Router → CC → UAV FC
  dah-gcs:
    build:
      context: .
      dockerfile: gcs/Dockerfile
    container_name: dah-gcs
    environment:
      LISTEN_PORT: 14570
      ROUTER_HOST: tactical-router
      ROUTER_CMD_PORT: 14580
    ports:
      - "8083:8080"
    depends_on:
      - tactical-router
    networks:
      - ops_net

  # ── 대시보드
  dah-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dah-dashboard
    depends_on:
      - dah-ugv
      - tactical-router
      - mission-control
      - telemetry-collector
    environment:
      MISSION_CONTROL_URL: http://mission-control:8080
      ROUTER_TELEMETRY_PORT: 14571
      UAV_HOST: 172.20.0.10
      UAV_CMD_PORT: 14551
      UGV_HOST: 172.20.0.20
      UGV_CMD_PORT: 14661
    ports:
      - "8081:8080"
    networks:
      ops_net:
      dah-net:
        ipv4_address: 172.20.0.70

  # ── 정찰 에이전트 (도청)
  dah-recon:
    profiles: ["cyber-lab"]
    build:
      context: .
      dockerfile: attack_agent/Dockerfile
    container_name: dah-recon
    depends_on:
      - dah-uav
    networks:
      dah-net:
        ipv4_address: 172.20.0.40

  # ── 공격 에이전트 (LAND 명령 주입)
  dah-executor:
    profiles: ["cyber-lab"]
    build:
      context: .
      dockerfile: attack_agent/Dockerfile
    container_name: dah-executor
    command: ["python", "executor.py"]
    depends_on:
      - dah-uav
    networks:
      dah-net:
        ipv4_address: 172.20.0.50

  # ── 방어 에이전트 (탐지 + 차단)
  dah-defense:
    profiles: ["cyber-lab"]
    build:
      context: .
      dockerfile: defense_agent/Dockerfile
    container_name: dah-defense
    depends_on:
      - dah-uav
    networks:
      dah-net:
        ipv4_address: 172.20.0.60

# ── 가상 네트워크
networks:
  uav_net:
    driver: bridge
  ops_net:
    driver: bridge
  dah-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
