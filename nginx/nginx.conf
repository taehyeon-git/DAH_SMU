events { worker_connections 1024; }

http {
    # 공통 프록시 헤더
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 10s;

    server {
        listen 8080;

        # ── Dashboard (메인 UI + /api/live, /api/topology)
        location / {
            proxy_pass http://dah-dashboard:8080/;
        }

        # ── GCS API  →  /gcs/api/status, /gcs/api/dashboard, /gcs/api/command
        location /gcs/ {
            proxy_pass http://dah-gcs:8080/;
        }

        # ── Upper C2/BMS API  →  /c2/api/platforms, /c2/api/events, /c2/api/order
        location /c2/ {
            proxy_pass http://mission-control:8080/;
        }

        # ── Tactical Router API  →  /router/api/ticn/status, /router/api/ticn/jam
        location /router/ {
            proxy_pass http://tactical-router:8080/;
        }
    }
}
