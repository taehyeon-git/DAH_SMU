<!-- GCS: 지상통제소 수신 패널 -->
<div class="content" id="dash3" style="display:none; background:#0d1117; padding:12px; gap:10px;">

  <div style="display:flex; align-items:center; gap:10px; flex-shrink:0; margin-bottom:2px;">
    <div id="gcs-dot" style="width:8px;height:8px;border-radius:50%;background:#3fb950;flex-shrink:0;"></div>
    <span style="font-size:11px;font-weight:700;letter-spacing:2px;color:#f0f6fc;">GCS — GROUND CONTROL STATION</span>
    <span id="gcs-upd" style="margin-left:auto;font-size:10px;color:#8b949e;">--</span>
  </div>

  <div class="gcs-grid">
    <!-- UAV 패널 -->
    <div class="gcs-panel">
      <div class="gcs-ph">
        <div style="width:7px;height:7px;border-radius:50%;background:#79c0ff;"></div>
        <h2 class="gcs-uav">UAV-001 · 송골매</h2>
        <span class="gcs-badge" id="g-uav-st">--</span>
      </div>
      <div class="gcs-tgrid">
        <div class="gcs-tcell"><div class="gcs-tlbl">고도</div><div class="gcs-tval" id="g-uav-alt">-- m</div></div>
        <div class="gcs-tcell"><div class="gcs-tlbl">속도</div><div class="gcs-tval" id="g-uav-spd">-- kt</div></div>
        <div class="gcs-tcell"><div class="gcs-tlbl">연료</div><div class="gcs-tval" id="g-uav-fuel">-- %</div></div>
        <div class="gcs-tcell"><div class="gcs-tlbl">위치</div><div class="gcs-tval" id="g-uav-pos" style="font-size:11px;">--</div></div>
      </div>
    </div>

    <!-- UGV 패널 -->
    <div class="gcs-panel">
      <div class="gcs-ph">
        <div style="width:7px;height:7px;border-radius:50%;background:#56d364;"></div>
        <h2 class="gcs-ugv">UGV-001</h2>
        <span class="gcs-badge" id="g-ugv-st">--</span>
      </div>
      <div class="gcs-tgrid">
        <div class="gcs-tcell"><div class="gcs-tlbl">속도</div><div class="gcs-tval" id="g-ugv-spd">-- m/s</div></div>
        <div class="gcs-tcell"><div class="gcs-tlbl">배터리</div><div class="gcs-tval" id="g-ugv-bat">-- %</div></div>
        <div class="gcs-tcell"><div class="gcs-tlbl">센서</div><div class="gcs-tval" id="g-ugv-sen" style="font-size:12px;">--</div></div>
        <div class="gcs-tcell"><div class="gcs-tlbl">위치</div><div class="gcs-tval" id="g-ugv-pos" style="font-size:11px;">--</div></div>
      </div>
    </div>
  </div>

</div>
