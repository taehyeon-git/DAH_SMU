<!-- 대시보드2: 3단 로그 그리드 (Telemetry / Command / 우측 패널) -->
<div class="d2-grid">

  <!-- Telemetry 로그 -->
  <div class="card" style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="card-title">Telemetry 로그 (상태 보고)</div>
    <div class="log-scroll">
      <table class="d2-tbl">
        <thead><tr><th>시간</th><th>대상</th><th>메시지 유형</th><th>프로토콜</th><th>주요 데이터</th><th>상태</th></tr></thead>
        <tbody id="d2-telem-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Command 로그 -->
  <div class="card" style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="card-title">Command 로그 (명령 전송)</div>
    <div class="log-scroll">
      <table class="d2-tbl">
        <thead><tr><th>시간</th><th>대상</th><th>명령</th><th>발신 주체</th><th>상태</th><th>ACK</th></tr></thead>
        <tbody id="d2-cmd-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 우측 패널 -->
  <div class="d2-right">

    <!-- 미니 맵 -->
    <div class="card d2-map">
      <div class="card-title">MAP / 트랙 뷰 (실시간)</div>
      <div id="leaflet-map2"></div>
    </div>

    <!-- 패킷 흐름 차트 -->
    <div class="card">
      <div class="card-title" style="margin-bottom:6px;">패킷 흐름 (최근 5분)
        <span style="margin-left:auto;display:flex;gap:10px;font-size:9px;font-weight:400;color:#8a96aa;">
          <span><span style="display:inline-block;width:12px;height:2px;background:#22c55e;vertical-align:middle;margin-right:3px;"></span>수신률</span>
          <span><span style="display:inline-block;width:12px;height:2px;background:#6fb9ff;vertical-align:middle;margin-right:3px;"></span>ACK</span>
          <span><span style="display:inline-block;width:12px;height:2px;background:#f87171;vertical-align:middle;margin-right:3px;"></span>손실</span>
        </span>
      </div>
      <canvas id="d2-chart" height="80" style="width:100%;display:block;"></canvas>
    </div>

    <!-- 통신 링크 상태 -->
    <div class="card">
      <div class="card-title">통신 링크 상태</div>
      <table class="d2-tbl">
        <thead><tr><th>링크</th><th></th><th>상태</th><th>지연</th><th>손실</th></tr></thead>
        <tbody>
          <tr><td>UAV ↔ Gateway</td><td><span class="dot g"></span></td><td class="st-ok">정상</td><td>412ms</td><td>1.5%</td></tr>
          <tr><td>UGV ↔ Gateway</td><td><span class="dot g"></span></td><td class="st-ok">정상</td><td>534ms</td><td>1.2%</td></tr>
          <tr><td>Gateway ↔ GCS/C2</td><td><span class="dot g"></span></td><td class="st-ok">정상</td><td>201ms</td><td>0.8%</td></tr>
          <tr><td>GCS/C2 ↔ UAV</td><td><span class="dot g"></span></td><td class="st-ok">정상</td><td>412ms</td><td>1.3%</td></tr>
          <tr><td>GCS/C2 ↔ UGV</td><td><span class="dot g"></span></td><td class="st-ok">정상</td><td>534ms</td><td>1.2%</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
