<!-- 대시보드1: 통합 로그 + 링크 상태 -->
<div class="row-bot">

  <!-- 통합 로그 -->
  <div class="card log-unified-card">
    <div class="log-unified-header">
      <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="card-title" style="margin-bottom:0">LOG</span>
          <span class="log-count" id="log-count">0 rows</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="log-filter-btns" style="margin:0">
            <button class="log-filter-btn active" data-filter="all">ALL</button>
            <span style="width:1px;height:16px;background:#dde1ea;display:inline-block;margin:0 4px;vertical-align:middle"></span>
            <button class="log-filter-btn log-filter-uav" data-filter="uav">UAV</button>
            <button class="log-filter-btn log-filter-ugv" data-filter="ugv">UGV</button>
            <span style="width:1px;height:16px;background:#dde1ea;display:inline-block;margin:0 4px;vertical-align:middle"></span>
            <button class="log-filter-btn" data-filter="tel">TEL</button>
            <button class="log-filter-btn" data-filter="cmd">CMD</button>
          </div>
          <div class="log-search-wrap" style="margin-left:auto">
            <input id="log-search" class="log-search" type="text" placeholder="검색...">
          </div>
        </div>
      </div>
    </div>
    <div class="log-scroll">
      <table class="log-tbl">
        <thead>
          <tr>
            <th style="width:68px">시간</th>
            <th style="width:80px">유형</th>
            <th style="width:72px">대상</th>
            <th>내용</th>
            <th style="width:80px">프로토콜</th>
            <th style="width:52px">상태</th>
          </tr>
        </thead>
        <tbody id="d1-log-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 통신 링크 상태 -->
  <div class="card">
    <div class="card-title">통신 링크 상태</div>
    <div class="log-scroll">
      <table class="log-tbl">
        <thead><tr><th>링크</th><th>상태</th><th>프로토콜</th><th>지연 / 품질</th><th>손실</th></tr></thead>
        <tbody id="d1-link-body">
          <!-- UAV: CC → GCS (MAVLink) -->
          <tr>
            <td>CC → GCS</td>
            <td><span class="badge" id="lnk-uav-st">--</span></td>
            <td>MAVLink/UDP</td>
            <td id="lnk-uav-lat">-- ms</td>
            <td id="lnk-uav-loss">-- %</td>
          </tr>
          <!-- UAV: GCS → Router (TMMR/TICN) -->
          <tr>
            <td>GCS → Router</td>
            <td><span class="badge" id="lnk-gcs-rt-st">--</span></td>
            <td id="lnk-gcs-rt-wf">TMMR/UDP</td>
            <td id="lnk-gcs-rt-rssi">-- dBm</td>
            <td id="lnk-gcs-rt-loss">-- %</td>
          </tr>
          <!-- UAV: Router → Upper C2/BMS (TICN) -->
          <tr>
            <td>Router → Upper C2/BMS</td>
            <td><span class="badge" id="lnk-rt-c2-st">--</span></td>
            <td>TICN/UDP</td>
            <td id="lnk-rt-c2-lq">LQ --</td>
            <td id="lnk-rt-c2-loss">-- %</td>
          </tr>
          <!-- Upper C2/BMS → Router → GCS (명령 하달) -->
          <tr>
            <td>C2 → Router → GCS</td>
            <td><span class="badge" id="lnk-c2-rt-st">--</span></td>
            <td>TICN/UDP</td>
            <td>--</td>
            <td>--</td>
          </tr>
          <!-- UGV: UGV → Router (ROS2) -->
          <tr>
            <td>UGV → Router</td>
            <td><span class="badge" id="lnk-ugv-st">--</span></td>
            <td>ROS2/JSON</td>
            <td id="lnk-ugv-lat">-- ms</td>
            <td id="lnk-ugv-loss">-- %</td>
          </tr>
          <!-- GCS → Collector (정적) -->
          <tr>
            <td>GCS → Collector</td>
            <td><span class="badge b-ok">정상</span></td>
            <td>UDP</td>
            <td>--</td>
            <td>--</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
